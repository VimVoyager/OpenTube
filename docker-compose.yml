services:
  # ── SvelteKit frontend ────────────────────────────────────────────────────────
  frontend:
    image: opentube-frontend:latest
    build:
      context: OpenTube-Frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_API_URL=/api/v1
    ports:
      - "127.0.0.1:3636:3636"
    depends_on:
      - backend
      - proxy
    restart: unless-stopped
    networks:
      - opentube-network
    environment:
      - NODE_ENV=production
      - PORT=3636
      - PUBLIC_API_URL=/api/v1
      - PUBLIC_PROXY_URL=/proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://0.0.0.0:3636/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
 
  # ── Go stream proxy ───────────────────────────────────────────────────────────
  proxy:
    image: opentube-proxy:latest
    build:
      context: OpenTubeStreamProxy
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:4848:4848"
    restart: unless-stopped
    networks:
      - opentube-network
    environment:
      - PORT=4848
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4848/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Spring Boot API ───────────────────────────────────────────────────────────
  backend:
    image: opentube-backend:latest
    build:
      context: NewPipeExtractorApi
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    networks:
      - opentube-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=5050
      - JAVA_OPTS=-Xmx1g -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5050/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
 
volumes:
  backend-data:
    driver: local
 
networks:
  opentube-network:
    driver: bridge
