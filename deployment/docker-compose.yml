services:
  # ── Reverse proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
      - proxy
    restart: unless-stopped
    networks:
      - opentube-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
 
  # ── SvelteKit frontend ────────────────────────────────────────────────────────
  frontend:
    image: opentube-frontend:latest
    build:
      context: ../OpenTube-Frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    depends_on:
      - backend
      - proxy
    restart: unless-stopped
    networks:
      - opentube-network
    environment:
      - NODE_ENV=production
      - PUBLIC_API_URL=/api
      - PUBLIC_PROXY_URL=/proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://0.0.0.0:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
 
  # ── Go stream proxy ───────────────────────────────────────────────────────────
  proxy:
    image: opentube-proxy:latest
    build:
      context: ../OpenTubeStreamProxy
      dockerfile: Dockerfile
    expose:
      - "8081"
    restart: unless-stopped
    networks:
      - opentube-network
    environment:
      - GIN_MODE=release
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
 
  # ── Spring Boot API ───────────────────────────────────────────────────────────
  backend:
    image: opentube-backend:latest
    build:
      context: ../NewPipeExtractorApi
      dockerfile: Dockerfile
    expose:
      - "8080"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    networks:
      - opentube-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx1g -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
 
volumes:
  backend-data:
    driver: local
 
networks:
  opentube-network:
    driver: bridge
