# OpenTube – Nginx Configuration (HTTP only)
# Runs inside the nginx:alpine container.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    server_tokens off;

    client_max_body_size 100M;

    # ── Upstreams ───────────────────────────────────────────────────────────────
    # Docker's internal DNS resolves these service names automatically.

    upstream opentube_frontend {
        server frontend:3000;
    }

    upstream opentube_backend {
        server backend:8080;
    }

    upstream opentube_stream_proxy {
        server proxy:8081;
    }

    # ── HTTP server ─────────────────────────────────────────────────────────────
    # default_server + server_name _ catches all requests regardless of hostname,
    # which also eliminates the conflict with nginx's built-in default.conf.
    server {
        listen 80 default_server;
        server_name _;

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Spring Boot REST API ──────────────────────────────────────────────
	location /api/health {
	    rewrite ^/api/health$ /actuator/health break;
	    proxy_pass         http://opentube_backend;
	    proxy_http_version 1.1;
	    proxy_set_header Host              $host;
	    proxy_set_header X-Real-IP         $remote_addr;
	    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $scheme;
	    proxy_connect_timeout 5s;
	    proxy_send_timeout    5s;
	    proxy_read_timeout    5s;
	    access_log off;
	}

        location /api/ {
            proxy_pass         http://opentube_backend/api/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Go stream proxy ───────────────────────────────────────────────────
        # proxy_buffering off is critical — video bytes must flow straight
        # through without nginx buffering them in memory.
        location /proxy/ {
            proxy_pass         http://opentube_stream_proxy/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass range request headers so video seeking works
            proxy_set_header Range    $http_range;
            proxy_set_header If-Range $http_if_range;

            proxy_buffering         off;
            proxy_request_buffering off;

            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # ── SvelteKit frontend ────────────────────────────────────────────────
        location / {
            proxy_pass         http://opentube_frontend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;
        }
    }
}
